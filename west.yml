# The west manifest file for Realtek Nuwa SDK.

manifest:
  defaults:
    remote: upstream

  remotes:
    - name: upstream
      url-base: https://github.com/Ameba-AIoT
      # url-base: git@github.com:Ameba-AIoT

  # workspace topdir cannot be a .git repository, otherwise west build will fail, which means .west and .git can't be in the same directory.
  # If two projects have the same name, the project defined first has highest precedence.
  # Please add items below based on alphabetical order
  projects:
    - name: hal_realtek
      repo-path: nuwa_hal_realtek
      path: modules/hal/realtek
      revision: ca2ce1773ca4779523c029cb4c6afe10ac404ae6
    - name: nuwa_lib
      path: modules/hal/realtek/zephyr/blobs/ameba
      revision: f60fc97640d8960d3313e5183aecf28442273c08
    - name: nuwa-mcuboot
      path: bootloader/mcuboot
      revision: 3b1edb7df38ee8736868bc3f74fb65dc8b5fc9ba
    - name: tf-m
      path: modules/tee/tf-m/trusted-firmware-m
      repo-path: nuwa-trusted-firmware-m
      revision: e5312383d6931d9586d9aff40649e2acdb69269f
    - name: lvgl
      path: modules/lib/gui/lvgl
      repo-path: lvgl-zephyr
      revision: ameba/v4.2.1
    - name: nuwa_tools
      path: tools
      revision: 440ddc2c1f7ba84d7ae4bde5effc80e9e2a6d0c2
    - name: zephyr
      path: zephyr
      # west-commands: scripts/west-commands.yml
      revision: 70e905d41231103e34df47f8478bb471806235cb
      import:
        name-allowlist:
          - cmsis_6
          - littlefs
          - fatfs
          - mbedtls
          - zcbor

# The available self keys are path/west-commands/import, and all items are optional.
# If path is not given, the basename of the path component in the manifest repository URL(by west init -m) will be used by default.
# the .git repository containing west.yml is never modified by west
# the cmsis/realtek/zephyr need to be a .git by west and cmake.
  self:
    path: manifests
